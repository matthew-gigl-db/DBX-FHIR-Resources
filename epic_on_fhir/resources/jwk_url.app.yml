resources:
  apps:
    jwk_url_app:
      name: "epic-jwk-oauth2-url"
      source_code_path: ../src/jwk_url_app
      description: "A FastAPI App Used to Serve JWKS for OAuth2 Authentication with Epic on FHIR"
      lifecycle:
        prevent_destroy: true
      config:
        command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
        env: 
          - name: ALGO
            value: ${var.algo}
          - name: SECRET_SCOPE_NAME
            value: ${var.secret_scope_name}
          # Note: PIP_INDEX_URL is NOT set here. Databricks Apps run on managed
          # infrastructure with their own package mirror. The proxy is unreachable.
      resources:
        - name: "epic-on-fhir-public-key"
          description: "EPIC on FHIR Authentication Public Key"
          secret: 
            scope: ${var.secret_scope_name}
            key: public_key
            permission: "READ"
        - name: "epic-on-fhir-kid"
          description: "EPIC on FHIR Authentication KID"
          secret: 
            scope: ${var.secret_scope_name}
            key: kid
            permission: "READ"
