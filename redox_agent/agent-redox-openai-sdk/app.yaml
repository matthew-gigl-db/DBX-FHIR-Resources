command: ["uv", "run", "start-app"]
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  # Redox MCP configuration
  # REDOX_MCP_APP_NAME is set statically here for local dev; overridden by databricks.yml at deploy time
  - name: REDOX_MCP_APP_NAME
    value: "mcp-redox"
  # REDOX_MCP_URL is injected from the 'redox_mcp_url' secret resource at deploy time
  # For local dev, set REDOX_MCP_URL in your .env file instead
  - name: REDOX_MCP_URL
    valueFrom: "redox_mcp_url"
