# FHIR ETL Orchestration job.
#
# Runs the FHIR bundle ingestion ETL (bronze) pipeline followed by the FHIR
# resource silver ETL pipeline in sequence. Intended to run after the FHIR
# Bundle Mover has landed files in the destination landing volume.
#
# This job is intentionally separate from the FHIR Bundle Mover job so that
# ingestion and silver processing can be triggered independently of file
# movement (e.g. for schema evolution, reprocessing, or manual runs).
#
# The full_refresh parameter controls refresh behavior for both pipelines.
# When set to "true", both pipelines are fully refreshed in order. When
# "false" (default), both run incrementally via Auto Loader checkpoints.
#
# Task graph (5 tasks):
#
#   check_full_refresh  (condition: full_refresh == "true")
#       |-- false --> incremental_ingestion_etl --> incremental_silver_etl
#       |-- true  --> full_refresh_ingestion_etl --> full_refresh_silver_etl

resources:
  jobs:
    fhir_etl_orchestration_job:
      name: FHIR ETL Orchestration
      description: >
        Runs the FHIR bundle ingestion ETL (bronze) pipeline followed by the
        FHIR resource silver ETL pipeline in sequence. Set full_refresh to
        "true" to trigger a full refresh of both pipelines in order. Defaults
        to incremental refresh, processing only new files via Auto Loader.

      email_notifications:
        on_failure:
          - ${var.tags_developer}

      run_as:
        user_name: ${var.run_as_user}

      parameters:
        - name: full_refresh
          default: "false"

      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}

      permissions:
        - user_name: matthew.giglia@databricks.com
          level: CAN_MANAGE

      tasks:
        # Task 1: Branch on the full_refresh parameter
        - task_key: check_full_refresh
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.full_refresh}}"
            right: "true"

        # Task 2a: Incremental ingestion ETL — runs when full_refresh != "true"
        - task_key: incremental_ingestion_etl
          depends_on:
            - task_key: check_full_refresh
              outcome: "false"
          pipeline_task:
            pipeline_id: ${resources.pipelines.fhir_bundle_ingestion_etl.id}
            full_refresh: false

        # Task 3a: Incremental silver ETL — runs after incremental ingestion
        - task_key: incremental_silver_etl
          depends_on:
            - task_key: incremental_ingestion_etl
          pipeline_task:
            pipeline_id: ${resources.pipelines.fhir_resource_silver_etl.id}
            full_refresh: false

        # Task 2b: Full refresh ingestion ETL — runs when full_refresh == "true"
        - task_key: full_refresh_ingestion_etl
          depends_on:
            - task_key: check_full_refresh
              outcome: "true"
          pipeline_task:
            pipeline_id: ${resources.pipelines.fhir_bundle_ingestion_etl.id}
            full_refresh: true

        # Task 3b: Full refresh silver ETL — runs after full refresh ingestion
        - task_key: full_refresh_silver_etl
          depends_on:
            - task_key: full_refresh_ingestion_etl
          pipeline_task:
            pipeline_id: ${resources.pipelines.fhir_resource_silver_etl.id}
            full_refresh: true
